<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Galgame 虚拟伙伴</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="scene">

    <div id="background"></div>

    <div id="sprite-area">
      <div id="sprite-container">
        <img id="layer-body"       class="layer" src="" />
        <img id="layer-hair-back"  class="layer" src="" />
        <img id="layer-head"       class="layer face" src="" />
        <img id="layer-hair-front" class="layer" src="" />
        <img id="layer-mouth"      class="layer mouth-overlay" src="" />
        <img id="layer-orb"        class="layer orb" src="" />
      </div>
      <div id="sprite-single">
        <img id="sprite-single-img" src="" />
      </div>
    </div>

    <div id="ui-layer">
      <div id="input-row">
        <button id="mic-btn" title="语音输入">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
          </svg>
        </button>
        <input id="user-input" type="text" placeholder="请输入你的回应..." autocomplete="off" />
        <button id="send-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>

      <div id="dialog-box">
        <div id="name-tag"><span id="character-name"></span></div>
        <p id="dialog-text"></p>
      </div>
    </div>

  </div>

  <a id="settings-link" href="./settings.html" title="立绘管理">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
    </svg>
  </a>

  <button id="history-btn" title="对话历史" onclick="toggleHistory()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 8v4l3 3"></path>
      <circle cx="12" cy="12" r="10"></circle>
    </svg>
  </button>

  <div id="history-panel">
    <div id="history-overlay" onclick="toggleHistory()"></div>
    <div id="history-content">
      <div id="history-header">
        <span id="history-title">对话历史</span>
        <button id="history-close" onclick="toggleHistory()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="history-list"></div>
    </div>
  </div>

  <audio id="tts-audio" preload="auto"></audio>

  <script src="./app.js"></script>
</body>
</html>
