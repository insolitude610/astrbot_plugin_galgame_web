<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>立绘管理 - AI Galgame 虚拟伙伴</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  min-height: 100vh;
  padding: 24px;
}
body.bg-loaded {
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}
body.bg-loaded::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(26, 26, 46, 0.75);
  z-index: -1;
}
h1 { font-size: 22px; margin-bottom: 4px; }
.sub { color: #888; margin-bottom: 20px; font-size: 13px; }
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  color: #aaa;
  text-decoration: none;
  font-size: 13px;
  margin-bottom: 16px;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid #333;
  transition: color .2s, background .2s;
}
.back-btn:hover { color: #c4b5fd; background: #1e293b; }
.mode-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
}
.mode-badge.single { background: #8b5cf633; color: #a78bfa; }
.mode-badge.layered { background: #4ade8033; color: #4ade80; }
.mode-desc {
  margin: 6px 0 16px;
  font-size: 13px;
  color: #aaa;
  line-height: 1.6;
}

/* sections */
.section {
  margin-bottom: 28px;
  padding: 16px;
  border-radius: 12px;
  border: 1px solid #333;
  background: #16213e;
}
.section.active { border-color: #8b5cf6; }
.section.inactive { opacity: 0.55; }
.section h2 {
  font-size: 16px;
  margin-bottom: 6px;
}
.section .hint {
  font-size: 12px;
  color: #888;
  margin-bottom: 14px;
  line-height: 1.5;
}
.section.inactive .hint::before {
  content: "当前模式为 ";
}
.section.inactive .hint::after {
  content: "，以下素材暂不生效。";
}
.sub-section-title {
  font-size: 13px;
  font-weight: 600;
  color: #aaa;
  margin: 14px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid #222;
}

/* slot grid */
.slot-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 10px;
}
.slot-card {
  background: #0d1b2a;
  border: 1px solid #333;
  border-radius: 10px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.slot-card.matched { border-color: #4ade8055; }
.slot-card.missing { border-color: #ef444455; }
.slot-img {
  width: 100%;
  aspect-ratio: 3/4;
  object-fit: contain;
  background: #111;
  border-radius: 6px;
  min-height: 80px;
}
.slot-img.placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  color: #444;
  background: #111;
  border-radius: 6px;
  aspect-ratio: 3/4;
}
.slot-name {
  font-size: 12px;
  font-weight: 600;
  color: #ccc;
}
.slot-status {
  font-size: 11px;
}
.slot-status.matched { color: #4ade80; }
.slot-status.missing { color: #ef4444; }

/* buttons */
.btn {
  padding: 5px 12px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  transition: opacity .2s;
}
.btn:hover { opacity: 0.85; }
.btn-primary { background: #8b5cf6; color: #fff; }
.btn-outline { background: transparent; border: 1px solid #555; color: #ccc; }
.btn-danger { background: #ef4444; color: #fff; }

/* action bar */
.action-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  align-items: center;
  flex-wrap: wrap;
}
.status { font-size: 13px; }
.status.success { color: #4ade80; }
.status.error { color: #ef4444; }
.loading { text-align: center; padding: 20px; color: #888; }

/* grid for all files */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  margin-top: 12px;
}
.card {
  background: #0d1b2a;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid #333;
}
.card-img { width: 100%; aspect-ratio: 3/4; object-fit: contain; background: #111; }
.card-body { padding: 8px 10px; }
.card-name { font-size: 11px; color: #aaa; word-break: break-all; }
.card-actions { margin-top: 6px; }
.card-actions .btn { padding: 3px 8px; font-size: 11px; }
</style>
</head>
<body>

<h1>立绘资源管理</h1>
<a class="back-btn" href="./index.html" title="返回 Galgame 界面">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  <span>返回</span>
</a>
<div class="sub" id="mode-indicator"></div>

<div class="action-bar">
  <button class="btn btn-primary" id="refresh-btn">刷新</button>
  <span class="status" id="status"></span>
</div>

<!-- Single mode section -->
<div class="section" id="section-single">
  <h2>Single 模式素材 — 全身立绘 + 表情差分</h2>
  <div class="hint">每种情绪对应<strong>一张完整半身立绘</strong>（身体+头+头发在一张图里）。AI 切换情绪时整张图替换。不需要图层文件。</div>
  <div class="slot-grid" id="slots-single"></div>
</div>

<!-- Layered mode section -->
<div class="section" id="section-layered">
  <h2>Layered 模式素材 — 分层 PNG 伪 Live2D</h2>
  <div class="hint">角色拆成多个透明 PNG 层叠加，各有独立动画。表情切换时<strong>只替换脸部</strong>。图层文件固定，表情文件为每种情绪准备一张<strong>仅脸部区域</strong>的 PNG。</div>
  <div class="sub-section-title">图层文件</div>
  <div class="slot-grid" id="slots-layers"></div>
  <div class="sub-section-title">表情文件（仅脸部区域）</div>
  <div class="slot-grid" id="slots-layered-expr"></div>
</div>

<!-- Background section -->
<div class="section" id="section-bg">
  <h2>场景背景图</h2>
  <div class="hint">一张背景图，推荐 16:9 或更宽的横向图片。</div>
  <div class="slot-grid" id="slots-bg"></div>
</div>

<!-- All files grid -->
<h3 style="margin-top: 28px;">所有已上传文件</h3>
<div class="section" style="border-color: #444; opacity: 1;">
  <div id="grid-container"></div>
  <div class="loading" id="loading">加载中...</div>
</div>

<script>
var PLUGIN = "astrbot_plugin_galgame_web";
var API_BASE = "/api/plug/" + PLUGIN;
var LAYER_KEYS = ["body","hair_back","head","hair_front","mouth_open","mouth_closed","orb"];
var BG_KEYS = ["background"];

var allFiles = [];
var config = {};

async function apiGet(endpoint) {
  var resp = await fetch(API_BASE + "/" + endpoint);
  if (!resp.ok) throw new Error(endpoint + " returned " + resp.status);
  return resp.json();
}

async function apiPost(endpoint, body) {
  var resp = await fetch(API_BASE + "/" + endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!resp.ok) throw new Error(endpoint + " returned " + resp.status);
  return resp.json();
}

async function init() {
  try {
    config = await apiGet("config");
  } catch(e) {
    config = {};
  }

  document.getElementById("refresh-btn").onclick = loadFiles;
  await loadFiles();
  applyBackground();
}

function applyBackground() {
  var bg = config.background;
  if (bg) {
    document.body.style.backgroundImage = "url(./assets/" + encodeURIComponent(bg) + ")";
    document.body.classList.add("bg-loaded");
  }
}

/* ---- data ---- */

function getEmotionKeys() {
  return config.emotion_keys || ["neutral","happy","sad","angry","surprised","blush","thinking"];
}

function getMatchedFile(key, prefix) {
  var keyL = key.toLowerCase();
  // 1) exact stem match: prefix_key
  if (prefix) {
    var prefixed = prefix + "_" + keyL;
    for (var i = 0; i < allFiles.length; i++) {
      var stem = allFiles[i].name.replace(/\.[^.]+$/, "").toLowerCase();
      if (stem === prefixed) return allFiles[i];
    }
  }
  // 2) exact stem match without prefix
  for (var i = 0; i < allFiles.length; i++) {
    var stem = allFiles[i].name.replace(/\.[^.]+$/, "").toLowerCase();
    if (stem === keyL) return allFiles[i];
  }
  // 3) word-parts match with prefix
  if (prefix) {
    var prefixL = prefix.toLowerCase();
    for (var i = 0; i < allFiles.length; i++) {
      var stem = allFiles[i].name.replace(/\.[^.]+$/, "").toLowerCase();
      var parts = stem.split(/[_\-\s.]+/);
      if (parts.indexOf(prefixL) !== -1 && parts.indexOf(keyL) !== -1) return allFiles[i];
    }
  }
  // 4) word-parts match
  for (var i = 0; i < allFiles.length; i++) {
    var stem = allFiles[i].name.replace(/\.[^.]+$/, "").toLowerCase();
    var parts = stem.split(/[_\-\s.]+/);
    if (parts.indexOf(keyL) !== -1) return allFiles[i];
  }
  // 5) substring fallback
  for (var i = 0; i < allFiles.length; i++) {
    var stem = allFiles[i].name.replace(/\.[^.]+$/, "").toLowerCase();
    if (stem.indexOf(keyL) !== -1) return allFiles[i];
  }
  return null;
}

function getMatchedBg() {
  for (var i = 0; i < allFiles.length; i++) {
    var stem = allFiles[i].name.replace(/\.[^.]+$/, "").toLowerCase();
    if (stem === "background" || stem === "bg") return allFiles[i];
  }
  return null;
}

/* ---- render ---- */

function renderAll() {
  renderModeIndicator();
  renderSingleSlots();
  renderLayeredLayerSlots();
  renderLayeredExprSlots();
  renderBgSlot();
  renderFileGrid();
}

function renderModeIndicator() {
  var mode = config.sprite_mode || "single";
  var el = document.getElementById("mode-indicator");
  el.innerHTML = '当前渲染模式：<span class="mode-badge ' + mode + '">' + (mode === "layered" ? "Layered 多层" : "Single 单图") + '</span> &nbsp;<span style="font-size:11px;color:#666;">（在插件配置页切换 sprite_mode）</span>';
}

function renderSingleSlots() {
  var section = document.getElementById("section-single");
  var grid = document.getElementById("slots-single");
  var mode = config.sprite_mode || "single";
  section.className = "section " + (mode === "single" ? "active" : "inactive");
  grid.innerHTML = "";
  var keys = getEmotionKeys();
  for (var i = 0; i < keys.length; i++) {
    grid.appendChild(slotCard(keys[i], getMatchedFile(keys[i], "single"), keys[i], "single"));
  }
}

function renderLayeredLayerSlots() {
  var section = document.getElementById("section-layered");
  var grid = document.getElementById("slots-layers");
  var mode = config.sprite_mode || "single";
  section.className = "section " + (mode === "layered" ? "active" : "inactive");
  grid.innerHTML = "";
  for (var i = 0; i < LAYER_KEYS.length; i++) {
    var k = LAYER_KEYS[i];
    var label = k === "head" ? "head (默认脸)" : k;
    grid.appendChild(slotCard(k, getMatchedFile(k, "layer"), label, "layer"));
  }
}

function renderLayeredExprSlots() {
  var grid = document.getElementById("slots-layered-expr");
  grid.innerHTML = "";
  var keys = getEmotionKeys();
  for (var i = 0; i < keys.length; i++) {
    grid.appendChild(slotCard(keys[i], getMatchedFile(keys[i], "expr"), keys[i], "expr"));
  }
}

function renderBgSlot() {
  var grid = document.getElementById("slots-bg");
  grid.innerHTML = "";
  grid.appendChild(slotCard("background", getMatchedBg(), "背景图", "bg"));
}

function slotCard(key, matchedFile, label, idPrefix) {
  var card = document.createElement("div");
  card.className = matchedFile ? "slot-card matched" : "slot-card missing";
  card.id = "slot-" + idPrefix + "-" + key;

  if (matchedFile && matchedFile.data) {
    var img = document.createElement("img");
    img.className = "slot-img";
    img.alt = key;
    img.src = matchedFile.data;
    card.appendChild(img);
  } else {
    var ph = document.createElement("div");
    ph.className = "slot-img placeholder";
    ph.textContent = "🖼";
    card.appendChild(ph);
  }

  var nameDiv = document.createElement("div");
  nameDiv.className = "slot-name";
  nameDiv.textContent = label;
  card.appendChild(nameDiv);

  var statusDiv = document.createElement("div");
  statusDiv.className = "slot-status " + (matchedFile ? "matched" : "missing");
  statusDiv.textContent = matchedFile ? "\u2705 " + matchedFile.name : "\u274C 未上传";
  card.appendChild(statusDiv);

  var fid = "file-" + idPrefix + "-" + key;
  var uploadKey = idPrefix + "_" + key;
  var fileInput = document.createElement("input");
  fileInput.type = "file";
  fileInput.accept = "image/*";
  fileInput.id = fid;
  fileInput.style.display = "none";
  (function(k, inp) { inp.onchange = function() { uploadToSlot(k, inp); }; })(uploadKey, fileInput);
  card.appendChild(fileInput);

  var btn = document.createElement("button");
  btn.className = "btn btn-primary";
  btn.textContent = "上传";
  (function(fidRef) { btn.onclick = function() { document.getElementById(fidRef).click(); }; })(fid);
  card.appendChild(btn);

  if (allFiles.length > 0) {
    var select = document.createElement("select");
    select.style.cssText = "margin-top:4px;font-size:11px;padding:2px 4px;background:#1a1a2e;color:#ccc;border:1px solid #444;border-radius:4px;width:100%;";
    var opt0 = document.createElement("option");
    opt0.value = "";
    opt0.textContent = "选择已有文件...";
    select.appendChild(opt0);
    for (var j = 0; j < allFiles.length; j++) {
      var opt = document.createElement("option");
      opt.value = allFiles[j].name;
      opt.textContent = allFiles[j].name;
      select.appendChild(opt);
    }
    (function(k, sel) { sel.onchange = function() { if (sel.value) assignToSlot(k, sel.value); }; })(uploadKey, select);
    card.appendChild(select);
  }

  return card;
}

function renderFileGrid() {
  var container = document.getElementById("grid-container");
  if (allFiles.length === 0) {
    container.innerHTML = '<div class="loading">暂无文件</div>';
    return;
  }
  var grid = document.createElement("div");
  grid.className = "grid";
  for (var i = 0; i < allFiles.length; i++) {
    var f = allFiles[i];
    var card = document.createElement("div");
    card.className = "card";

    var img = document.createElement("img");
    img.className = "card-img";
    img.alt = f.name;
    img.loading = "lazy";
    img.src = f.data || "";
    card.appendChild(img);

    var body = document.createElement("div");
    body.className = "card-body";
    var nameEl = document.createElement("div");
    nameEl.className = "card-name";
    nameEl.textContent = f.name;
    body.appendChild(nameEl);

    var actions = document.createElement("div");
    actions.className = "card-actions";
    var delBtn = document.createElement("button");
    delBtn.className = "btn btn-danger";
    delBtn.textContent = "删除";
    delBtn.onclick = function(fn) { return function() { deleteFile(fn); }; }(f.name);
    actions.appendChild(delBtn);
    body.appendChild(actions);

    card.appendChild(body);
    grid.appendChild(card);
  }
  container.innerHTML = "";
  container.appendChild(grid);
}

/* ---- upload ---- */

async function uploadToSlot(key, input) {
  var file = input.files[0];
  if (!file) return;
  input.value = "";

  var base64 = await new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function() { resolve(reader.result); };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });

  setStatus("上传 " + key + " ...");
  try {
    var data = await apiPost("assets/upload-key", { key: key, data: base64 });
    if (data.uploaded) {
      setStatus("✅ " + key + " → " + data.uploaded, "success");
      await loadFiles();
    } else {
      setStatus("❌ " + key + ": " + (data.error || "失败"), "error");
    }
  } catch(e) {
    setStatus("❌ " + key + ": " + e.message, "error");
  }
}

async function assignToSlot(key, sourceName) {
  setStatus("分配 " + sourceName + " → " + key + " ...");
  try {
    var data = await apiPost("assets/copy", { source: sourceName, key: key });
    if (data.copied) {
      setStatus("✅ " + data.source + " → " + data.copied, "success");
      await loadFiles();
    } else {
      setStatus("❌ " + (data.error || "失败"), "error");
    }
  } catch(e) {
    setStatus("❌ " + e.message, "error");
  }
}

/* ---- list / delete ---- */

async function loadFiles() {
  setStatus("");
  var loading = document.getElementById("loading");
  loading.style.display = "block";
  try {
    var data = await apiGet("assets/list");
    var rawFiles = data.files || [];
    if (rawFiles.length > 0) {
      var names = [];
      for (var i = 0; i < rawFiles.length; i++) { names.push(rawFiles[i].name); }
      var batchData = await apiPost("assets/batch", { names: names });
      allFiles = batchData.files || [];
    } else {
      allFiles = [];
    }
    renderAll();
  } catch(e) {
    setStatus("加载失败: " + e.message, "error");
  }
  loading.style.display = "none";
}

async function deleteFile(filename) {
  if (!confirm("确定删除 " + filename + "？")) return;
  setStatus("删除中...");
  try {
    var data = await apiPost("assets/delete", { filename: filename });
    if (data.deleted) {
      setStatus("已删除: " + data.deleted, "success");
      await loadFiles();
    } else {
      setStatus(data.error || "删除失败", "error");
    }
  } catch(e) {
    setStatus("删除失败: " + e.message, "error");
  }
}

function setStatus(msg, type) {
  var el = document.getElementById("status");
  el.textContent = msg;
  el.className = "status" + (type ? " " + type : "");
  if (msg) setTimeout(function() { if (el.textContent === msg) { el.textContent = ""; el.className = "status"; } }, 5000);
}

init();
</script>
</body>
</html>
